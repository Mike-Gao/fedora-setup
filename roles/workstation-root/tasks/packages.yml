- name: Create a symbolic link
  file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
    
- name: install starship
  shell: curl -fsSL https://starship.rs/install.sh | bash -s -- -y
  args:
    creates: '/usr/local/bin/starship'
