- name: Upgrade all packages
  dnf:
    name: '*'
    state: latest

- name: Enable the RPM Fusion repository
  dnf:
    name:
      - 'https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm'
    state: present
    disable_gpg_check: yes
    
- name: Enable the RPM Fusion Non-free repository
  dnf:
    name:
      - 'https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm'
    state: present
    disable_gpg_check: yes

- name: Add the Azul Java Repository
  dnf:
    name:
      - 'https://cdn.azul.com/zulu/bin/zulu-repo-1.0.0-1.noarch.rpm'
    state: present
    disable_gpg_check: yes

- name: Install nvidia support and other packages from @negativo17 - (Cannot be used with @rpmfusion)
  package:
    name: '{{ negativo17 }}'
    state: present
  vars:
  negativo17:
      - nvidia-driver
      - nvidia-settings
      - akmod-nvidia
      # - nvidia-driver-libs.i686 # to add 32bit lib on a 64 bit system
      - nvidia-driver-cuda
      - nvidia-settings
      - cuda  
      - cuda-devel
      - cuda-cudnn
      - blender-cuda
      - gstreamer1-plugins-bad-fluidsynth
      - gstreamer1-plugins-bad
      - gstreamer1-vaapi
      - gstreamer1-plugins-ugly
      - rar
      - ffmpeg
      - steam
      
