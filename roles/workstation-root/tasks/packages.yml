      - akmod-nvidia
      - xorg-x11-drv-nvidia-cuda
      - xorg-x11-drv-nvidia-cuda-libs
      # nvidia modules ends here
      - snapd
      - vulkan
      - aria2
      - git
      - git-lfs
      - neovim
      - htop
      - zulu8-jdk
      - java-11-openjdk-devel
      - golang
      - nodejs
      - yarn
      - code
      - google-chrome-stable
      - python3-psutil # ansible dconf module
      - python-pip
      - evolution
      - evolution-ews
      - seahorse
      - seahorse-nautilus
      - texlive
      - latexmk
      - texlive-chktex
      - texlive-latexindent
      - texlive-wrapfig
      - texlive-sourcesanspro
      - texlive-fontawesome
      - texlive-tcolorbox
      - texlive-clrscode3e
      - gimp
      - inkscape
      - gcc
      - gcc-c++
      - llvm
      - clang
      - lldb
      - make
      - cmake
      - ffmpeg
      - dino
      - resilio-sync
      - emacs
      - blender
      - celluloid
      - foliate
      - sublime-text
      - freecad
      - remmina
      - deadbeef
      - krita
      - renderdoc
